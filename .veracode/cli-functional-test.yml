name: NPSP
testcases:
- name: Package NPSP Repo
  steps:
  - type: exec
    script: |
      cd ../
      veracode package --source . --type directory --output .veracode/output/auto --trust
    assertions:
      - result.code ShouldEqual 0
      - result.timeseconds ShouldBeLessThan 300
      - result.systemout ShouldContainSubstring ".veracode/output/auto/veracode-auto-pack-NPSP-apex.zip"
      - result.systemout ShouldContainSubstring ".veracode/output/auto/veracode-auto-pack-NPSP-js.zip"
      - result.systemout ShouldContainSubstring ".veracode/output/auto/veracode-auto-pack-NPSP-python-no-pm.zip"
      - result.systemout ShouldContainSubstring ".veracode/output/auto/veracode-auto-pack-NPSP-sql.zip"
      - result.systemout ShouldContainSubstring "Successfully created 4 artifact(s)."

  - type: check-zip-count
    zip-file: "veracode-auto-pack-NPSP-apex.zip"
    assertions:
      - result.zip-file.count ShouldEqual 1169

  - type: check-zip-contents
    zip-file: "veracode-auto-pack-NPSP-apex.zip"
    assertions:
      - result.zip-file.difference ShouldBeEmpty

  - type: check-zip-count
    zip-file: "veracode-auto-pack-NPSP-js.zip"
    assertions:
      - result.zip-file.count ShouldEqual 636

  - type: check-zip-contents
    zip-file: "veracode-auto-pack-NPSP-js.zip"
    assertions:
      - result.zip-file.difference ShouldBeEmpty

  - type: check-zip-count
    zip-file: "veracode-auto-pack-NPSP-python-no-pm.zip"
    assertions:
      - result.zip-file.count ShouldEqual 63

  - type: check-zip-contents
    zip-file: "veracode-auto-pack-NPSP-python-no-pm.zip"
    assertions:
      - result.zip-file.difference ShouldBeEmpty

  - type: check-zip-count
    zip-file: "veracode-auto-pack-NPSP-sql.zip"
    assertions:
      - result.zip-file.count ShouldEqual 5

  - type: check-zip-contents
    zip-file: "veracode-auto-pack-NPSP-sql.zip"
    assertions:
      - result.zip-file.difference ShouldBeEmpty